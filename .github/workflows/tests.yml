name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Backend and frontend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # Backend tests
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: software/backend/go.mod
          cache-dependency-path: software/backend/go.sum

      - name: Download backend dependencies
        working-directory: software/backend
        run: go mod download

      - name: Run backend tests with coverage
        working-directory: software/backend
        run: |
          go test -v ./... -coverprofile=coverage.out
          go tool cover -func=coverage.out

      # Frontend tests
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: software/frontend/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: software/frontend/web
        run: npm ci

      - name: Run frontend tests
        working-directory: software/frontend/web
        run: npm test -- --run